name: 🧪 CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Instalar el proyecto en modo editable para validar pyproject.toml
          pip install -e .
          
      - name: Verify code structure
        run: |
          # Verificar que los directorios y archivos base existan
          ls -d core api cli config
          [ -f "core/agent.py" ] || exit 1
          [ -f "api/main.py" ] || exit 1
          [ -f "cli/main.py" ] || exit 1
          echo "✅ Estructura de archivos base OK"

      - name: Static code check (Syntax)
        run: |
          # Verificar sintaxis básica de Python sin ejecutar (evita fallos por falta de Ollama/Hardware)
          python -m compileall core api cli config
          echo "✅ Sintaxis Python OK"

      - name: Project Summary
        run: |
          echo "🎉 Validación completada. El repositorio está limpio y listo para instalar localmente."
          echo "Nota: Las pruebas de importación profunda se omiten en CI debido a dependencias de hardware local (Ollama)."
